name: Security

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag v6.0.2

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # tag v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install govulncheck (optional)
        if: ${{ env.XLIB_ENABLE_VULNCHECK == '1' }}
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Security
        run: GOWORK=off make security
