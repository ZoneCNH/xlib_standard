name: Release Check

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-check:
    runs-on: ubuntu-latest
    env:
      XLIB_ENABLE_VULNCHECK: "0"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Install govulncheck (optional)
        if: ${{ env.XLIB_ENABLE_VULNCHECK == '1' }}
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Release Check
        env:
          XLIB_ENABLE_VULNCHECK: "0"
        run: |
          export VERSION="${{ github.ref_name }}"
          export WORKFLOW_RUN_ID="${{ github.run_id }}"
          export ARTIFACT_NAME="release-manifest-${{ github.run_id }}"
          export ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GOWORK=off make release-final-check

      - name: Hash release evidence
        if: always()
        id: release-evidence
        run: |
          digest="$(./scripts/hash_release_evidence.sh)"
          echo "latest_json_sha256=${digest}" >> "$GITHUB_OUTPUT"
          {
            echo "## Release evidence"
            echo "- Artifact: \`release-manifest-${{ github.run_id }}\`"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Manifest: \`release/manifest/latest.json\`"
            echo "- SHA256: \`${digest}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Manifest
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag v7.0.1
        with:
          name: release-manifest-${{ github.run_id }}
          path: |
            release/manifest/latest.json
            release/manifest/latest.json.sha256
          if-no-files-found: error

      - name: Publish GitHub Release
        if: ${{ success() && startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --latest \
              --draft=false \
              --prerelease=false \
              --verify-tag
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --generate-notes \
              --latest \
              --verify-tag
          fi

      - name: Verify GitHub Release
        if: ${{ success() && startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          release_json="$(gh release view "${RELEASE_TAG}" --json isDraft,isPrerelease,tagName,url)"
          printf '%s\n' "${release_json}"
          printf '%s\n' "${release_json}" | jq -e --arg tag "${RELEASE_TAG}" '
            .tagName == $tag
            and .isDraft == false
            and .isPrerelease == false
            and (.url | length > 0)
          '
