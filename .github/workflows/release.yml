name: Release Check

on:
  push:
    tags:
      - "v*"

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Release Check
        run: VERSION="${{ github.ref_name }}" GOWORK=off make release-final-check

      - name: Hash release evidence
        if: always()
        id: release-evidence
        run: |
          digest="$(./scripts/hash_release_evidence.sh)"
          echo "latest_json_sha256=${digest}" >> "$GITHUB_OUTPUT"
          {
            echo "## Release evidence"
            echo "- Artifact: \`release-manifest-${{ github.run_id }}\`"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Manifest: \`release/manifest/latest.json\`"
            echo "- SHA256: \`${digest}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ github.run_id }}
          path: |
            release/manifest/latest.json
            release/manifest/latest.json.sha256
          if-no-files-found: error
