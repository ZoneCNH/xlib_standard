name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    env:
      XLIB_ENABLE_VULNCHECK: "0"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.6.2
          install-mode: binary
          skip-cache: true
      - name: CI
        run: GOWORK=off XLIB_CONTEXT=ci_pull_request make ci

  release-check:
    name: release-check
    runs-on: ubuntu-latest
    env:
      XLIB_ENABLE_VULNCHECK: "0"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.6.2
          install-mode: binary
          skip-cache: true
      - name: Install govulncheck (optional)
        if: ${{ env.XLIB_ENABLE_VULNCHECK == '1' }}
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - name: Release Check
        env:
          ARTIFACT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: GOWORK=off XLIB_CONTEXT=ci_pull_request make release-check
      - name: Upload release manifest evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest-${{ github.run_id }}
          path: |
            release/manifest/latest.json
            release/manifest/latest.json.sha256
          if-no-files-found: ignore
