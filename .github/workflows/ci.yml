name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # tag v4

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # tag v5
        with:
          go-version: "1.23"

      - name: Cache Go
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # tag v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Release Check
        run: |
          export WORKFLOW_RUN_ID="${{ github.run_id }}"
          export ARTIFACT_NAME="release-manifest-${{ github.run_id }}"
          export ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GOWORK=off make release-check

      - name: Full Goal Runtime score
        run: GOWORK=off go run ./cmd/xlibgate score --min 9.8

      - name: Hash release evidence
        if: always()
        id: release-evidence
        run: |
          digest="$(./scripts/hash_release_evidence.sh)"
          echo "latest_json_sha256=${digest}" >> "$GITHUB_OUTPUT"
          {
            echo "## Release evidence"
            echo "- Artifact: \`release-manifest-${{ github.run_id }}\`"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Manifest: \`release/manifest/latest.json\`"
            echo "- SHA256: \`${digest}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag v7.0.1
        with:
          name: release-manifest-${{ github.run_id }}
          path: |
            release/manifest/latest.json
            release/manifest/latest.json.sha256
          if-no-files-found: warn
