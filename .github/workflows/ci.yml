# 合并 CI — 将 6 个 push/PR workflow 合并为 1 个，减少重复 checkout/setup-go
#
# 合并来源：ci.yml, security.yml, integration.yml, adoption-check.yml,
#           docker-contract.yml, worktree-guard.yml
#
# 保留独立：goal-gates.yml (手动), release.yml (tag), release-auto-patch.yml (main)

name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"  # 每周一 03:17 UTC（安全扫描）

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint + Test + Release Check ──────────────────────────────
  ci:
    runs-on: ubuntu-latest
    env:
      XLIB_ENABLE_VULNCHECK: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # tag v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Install govulncheck (optional)
        if: ${{ env.XLIB_ENABLE_VULNCHECK == '1' }}
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Release Check
        env:
          XLIB_ENABLE_VULNCHECK: "0"
        run: |
          export WORKFLOW_RUN_ID="${{ github.run_id }}"
          export ARTIFACT_NAME="release-manifest-${{ github.run_id }}"
          export ARTIFACT_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GOWORK=off XLIB_CONTEXT=ci_pull_request make release-check

      - name: Hash release evidence
        if: always()
        id: release-evidence
        run: |
          digest="$(./scripts/hash_release_evidence.sh)"
          echo "latest_json_sha256=${digest}" >> "$GITHUB_OUTPUT"
          debt_digest=""
          if [ -f release/debt/latest.json ]; then
            debt_digest="$(./scripts/hash_release_evidence.sh release/debt/latest.json release/debt/latest.json.sha256)"
            echo "debt_json_sha256=${debt_digest}" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "## Release evidence"
            echo "- Artifact: \`release-manifest-${{ github.run_id }}\`"
            echo "- Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "- Manifest: \`release/manifest/latest.json\`"
            echo "- SHA256: \`${digest}\`"
            if [ -n "$debt_digest" ]; then
              echo "- Debt evidence: \`release/debt/latest.json\`"
              echo "- Debt SHA256: \`${debt_digest}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag v7.0.1
        with:
          name: release-manifest-${{ github.run_id }}
          path: |
            release/manifest/latest.json
            release/manifest/latest.json.sha256
            release/debt/latest.json
            release/debt/latest.md
            release/debt/latest.json.sha256
          if-no-files-found: warn

  # ── 2. Docker Contract ──────────────────────────────────────────
  docker-contract:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
      GOWORK: off
      XLIB_CONTEXT: ci_pull_request
      XLIB_ENABLE_VULNCHECK: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # tag v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # tag v4.1.0

      - name: Docker toolchain check
        run: make docker-toolchain-check

      - name: Docker build contract
        run: make docker-build-check

      - name: Docker CI gate
        run: make docker-ci

      - name: Docker release gate
        env:
          XLIB_CONTEXT: release_verify
          VERSION: ci-docker-contract-${{ github.run_id }}
        run: make docker-release-check

      - name: Upload Docker contract evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag v7.0.1
        with:
          name: docker-contract-${{ github.run_id }}
          path: |
            release/evidence/docker-toolchain-summary.json
            release/docker/*.md
          if-no-files-found: warn

  # ── 3. Security (含周度 vulncheck) ─────────────────────────────
  security:
    runs-on: ubuntu-latest
    env:
      XLIB_ENABLE_VULNCHECK: ${{ github.event_name == 'schedule' && '1' || vars.XLIB_ENABLE_VULNCHECK }}
      XLIB_VULNCHECK_INTERVAL_HOURS: "168"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # tag v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install govulncheck (optional)
        if: ${{ env.XLIB_ENABLE_VULNCHECK == '1' }}
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Security
        env:
          XLIB_ENABLE_VULNCHECK: ${{ github.event_name == 'schedule' && '1' || vars.XLIB_ENABLE_VULNCHECK }}
          XLIB_FORCE_VULNCHECK: ${{ github.event_name == 'schedule' && '1' || '' }}
          XLIB_VULNCHECK_INTERVAL_HOURS: "168"
        run: GOWORK=off make security

  # ── 4. Integration ──────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # tag v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Integration
        run: GOWORK=off make integration

  # ── 5. Adoption Check ───────────────────────────────────────────
  adoption-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Skip source-template repository
        if: ${{ github.event.repository.name == format('{0}{1}', 'xlib-', 'standard') }}
        run: echo "adoption-check is a rendered downstream gate; source template has no downstream lock"
      - name: Run downstream adoption gate
        if: ${{ github.event.repository.name != format('{0}{1}', 'xlib-', 'standard') }}
        run: GOWORK=off make adoption-check

  # ── 6. Worktree Guard ───────────────────────────────────────────
  worktree-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3
        with:
          fetch-depth: 0

      - name: 检查 PR 来源分支
        run: |
          HEAD_REF="${{ github.head_ref }}"
          if [ "$HEAD_REF" = "main" ] || [ "$HEAD_REF" = "master" ]; then
            echo "ERROR: PR 来源分支不能是 main/master。"
            echo "请使用 worktree 分支提交 PR。"
            exit 1
          fi
          echo "worktree-guard: 来源分支 $HEAD_REF，通过。"
