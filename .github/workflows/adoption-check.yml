name: adoption-check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  adoption-check:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag v7.0.0
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Skip source-template repository
        if: ${{ github.event.repository.name == format('{0}{1}', 'xlib-', 'standard') }}
        run: echo "adoption-check is a rendered downstream gate; source template has no downstream lock"
      - name: Run downstream adoption gate
        if: ${{ github.event.repository.name != format('{0}{1}', 'xlib-', 'standard') }}
        run: GOWORK=off make adoption-check
