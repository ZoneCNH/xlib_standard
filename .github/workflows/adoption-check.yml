name: adoption-check

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  adoption-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run downstream adoption gate
        run: GOWORK=off make adoption-check
