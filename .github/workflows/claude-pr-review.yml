name: Claude PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: claude-review
    runs-on:
      - self-hosted
      - claude-review
    timeout-minutes: 20
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.head.repo.full_name == github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3
        with:
          fetch-depth: 0

      - name: Verify local Claude
        run: |
          set -euo pipefail
          if ! command -v claude >/dev/null 2>&1; then
            echo "::error::local claude CLI is required on the self-hosted claude-review runner"
            exit 1
          fi
          claude --version || true

      - name: Prepare pull request diff
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          gh pr diff "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" > "$RUNNER_TEMP/pr.diff"
          if [ ! -s "$RUNNER_TEMP/pr.diff" ]; then
            echo "::error::pull request diff is empty"
            exit 1
          fi

      - name: Review pull request with local Claude
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          {
            cat <<'PROMPT'
            You are reviewing this pull request for xlib-standard.
            Treat CONSTITUTION.md, .agent/rules/, .agent/harness/, contracts/,
            docs/architecture/, and AGENTS.md as the authority chain.

            Review only. Do not push commits, create branches, merge pull
            requests, close pull requests, delete branches, modify repository
            settings, or change branch protection.

            Prioritize blockers:
            - secret exposure, unsafe config, or production credential leakage
            - missing DONE with evidence, fake completion, or unverified test claims
            - xlib-standard layer violations, L2 cross-dependencies, business
              logic in L0/L1/L2, or contract bypasses
            - generated artifact commits listed in
              .agent/registries/generated-artifacts.yaml or
              .agent/contracts/scope-locks.yaml
            - public API changes without contracts, examples, docs, tests, and
              release impact notes
            - workflow or supply-chain changes that do not pin third-party
              actions to a 40-character commit SHA with a source tag comment

            For each finding, include severity, file, line, why it violates the
            project rule, and the minimal corrective action. If no blocker is
            found, summarize residual verification gaps without claiming gates
            passed unless the workflow logs prove them.
          PROMPT
            printf '\nPR #%s: %s\n' "$PR_NUMBER" "$PR_TITLE"
            printf 'Author: %s\n\n' "$PR_AUTHOR"
            printf 'Body:\n%s\n\n' "${PR_BODY:-}"
            printf 'Diff:\n'
            cat "$RUNNER_TEMP/pr.diff"
          } > "$RUNNER_TEMP/claude-review-prompt.md"

          claude --print --input-format text --output-format text --tools "" \
            < "$RUNNER_TEMP/claude-review-prompt.md" \
            > "$RUNNER_TEMP/claude-review.md"

          if [ ! -s "$RUNNER_TEMP/claude-review.md" ]; then
            echo "::error::local Claude produced no review output"
            exit 1
          fi

      - name: Publish review comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          marker='<!-- xlib-standard-local-claude-review -->'
          body="$RUNNER_TEMP/claude-review-comment.md"
          {
            printf '%s\n' "$marker"
            printf '## Local Claude Review\n\n'
            if [ -s "$RUNNER_TEMP/claude-review.md" ]; then
              cat "$RUNNER_TEMP/claude-review.md"
            else
              printf 'Local Claude did not produce review output. Check workflow logs for runner availability, local Claude installation, and local Claude authentication.\n'
            fi
          } > "$body"

          comment_id="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json comments --jq '.comments[] | select(.body | contains("<!-- xlib-standard-local-claude-review -->")) | .id' | tail -n 1)"
          if [ -n "$comment_id" ]; then
            gh api graphql \
              -f query='mutation($id:ID!,$body:String!){updateIssueComment(input:{id:$id,body:$body}){issueComment{id}}}' \
              -f id="$comment_id" \
              -f body="$(cat "$body")"
          else
            gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file "$body"
          fi
