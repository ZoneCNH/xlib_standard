name: Claude PR Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  id-token: write
  pull-requests: write
  issues: write

concurrency:
  group: claude-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: claude-review
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ !github.event.pull_request.draft }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3
        with:
          fetch-depth: 0

      - name: Review pull request
        uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1 # tag v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          use_sticky_comment: "true"
          include_fix_links: "false"
          prompt: |
            You are reviewing this pull request for xlib-standard.
            Treat CONSTITUTION.md, .agent/rules/, .agent/harness/, contracts/,
            docs/architecture/, and AGENTS.md as the authority chain.

            Review only. Do not push commits, create branches, merge pull
            requests, close pull requests, delete branches, modify repository
            settings, or change branch protection.

            Prioritize blockers:
            - secret exposure, unsafe config, or production credential leakage
            - missing DONE with evidence, fake completion, or unverified test claims
            - xlib-standard layer violations, L2 cross-dependencies, business
              logic in L0/L1/L2, or contract bypasses
            - generated artifact commits listed in
              .agent/registries/generated-artifacts.yaml or
              .agent/contracts/scope-locks.yaml
            - public API changes without contracts, examples, docs, tests, and
              release impact notes
            - workflow or supply-chain changes that do not pin third-party
              actions to a 40-character commit SHA with a source tag comment

            For each finding, include severity, file, line, why it violates the
            project rule, and the minimal corrective action. If no blocker is
            found, summarize residual verification gaps without claiming gates
            passed unless the workflow logs prove them.
