name: Goal Gates

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Worktree Gate
        run: bash scripts/harness/no-main-dev.sh

      - name: Build
        run: make build

      - name: Lint
        run: |
          if command -v golangci-lint &>/dev/null; then
            golangci-lint run ./...
          else
            echo "golangci-lint 未安装，跳过。"
          fi

      - name: Test
        run: go test ./... -v -count=1

      - name: Evidence Check
        run: |
          if make evidence-check 2>/dev/null; then
            echo "evidence-check 通过。"
          else
            echo "evidence-check 目标未定义或失败，跳过。"
          fi
