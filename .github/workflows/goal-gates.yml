name: Goal Gates

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.6.2
          install-mode: binary
          skip-cache: true

      - name: Worktree Gate
        run: bash scripts/harness/no-main-dev.sh

      - name: Build
        run: GOWORK=off make build

      - name: Lint
        run: GOWORK=off make lint

      - name: Coverage
        run: GOWORK=off make coverage-check

      - name: Evidence Check
        run: GOWORK=off make evidence-check
