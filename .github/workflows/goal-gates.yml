name: Goal Gates

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag v7.0.0
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # tag v6.4.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Worktree Gate
        run: bash scripts/harness/no-main-dev.sh

      - name: Build
        run: make build

      - name: Lint
        run: |
          if command -v golangci-lint &>/dev/null; then
            golangci-lint run ./...
          else
            echo "golangci-lint 未安装，跳过。"
          fi

      - name: Test
        run: go test ./... -v -count=1

      - name: Evidence Check
        run: |
          if make evidence-check 2>/dev/null; then
            echo "evidence-check 通过。"
          else
            echo "evidence-check 目标未定义或失败，跳过。"
          fi
