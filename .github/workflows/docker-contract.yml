name: Docker Contract

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-contract:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
      GOWORK: off
      XLIB_CONTEXT: ci_pull_request
      XLIB_ENABLE_VULNCHECK: ${{ vars.XLIB_ENABLE_VULNCHECK }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # tag v6.0.3

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # tag v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # tag v3

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.6

      - name: Install govulncheck (optional)
        if: ${{ env.XLIB_ENABLE_VULNCHECK == '1' }}
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Docker toolchain check
        run: make docker-toolchain-check

      - name: Docker build contract
        run: make docker-build-check

      - name: Docker CI gate
        run: make docker-ci

      - name: Docker release gate
        env:
          XLIB_CONTEXT: release_verify
          VERSION: docker-contract-${{ github.run_id }}
        run: make docker-release-check

      - name: Docker drift contract
        run: make docker-drift-check

      - name: Docker runtime contract
        run: make docker-runtime-check

      - name: Docker goalcli version contract
        run: make docker-goalcli-version

      - name: Docker final release contract
        env:
          XLIB_CONTEXT: release_verify
          VERSION: docker-contract-final-${{ github.run_id }}
        run: make docker-release-final-check

      - name: Summarize Docker evidence
        if: always()
        run: |
          {
            echo "## Docker contract evidence"
            echo "- Artifact: \`docker-contract-${{ github.run_id }}\`"
            echo "- Toolchain report: \`release/docker/toolchain-check.md\`"
            echo "- Release manifest: \`release/manifest/latest.json\`"
            echo "- Evidence summary: \`release/evidence/docker-toolchain-summary.json\`"
            echo "- golangci-lint v2.1.6"
            echo "- govulncheck v1.1.4"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Docker contract evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag v7.0.1
        with:
          name: docker-contract-${{ github.run_id }}
          path: |
            release/docker/*.md
            release/manifest/latest.json
            release/manifest/latest.json.sha256
            release/evidence/docker-toolchain-summary.json
            release/debt/latest.json
            release/debt/latest.md
            release/debt/latest.json.sha256
          if-no-files-found: warn
