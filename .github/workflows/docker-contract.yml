name: Docker Contract

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-contract:
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
      GOWORK: off
      XLIB_CONTEXT: ci_pull_request
      XLIB_ENABLE_VULNCHECK: "0"
      BUILDX_BUILDER: xlib-standard-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # tag v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # tag v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Prepare BuildKit builder
        run: |
          if docker buildx inspect "$BUILDX_BUILDER" >/dev/null 2>&1; then
            docker buildx use "$BUILDX_BUILDER"
          else
            docker buildx create --name "$BUILDX_BUILDER" --driver docker-container --use
          fi
          docker buildx inspect "$BUILDX_BUILDER" --bootstrap

      - name: Docker toolchain check
        run: make docker-toolchain-check

      - name: Docker CI gate
        run: make docker-ci

      - name: Docker release gate
        env:
          XLIB_CONTEXT: release_verify
          VERSION: docker-contract-${{ github.run_id }}
        run: make docker-release-check

      - name: Summarize Docker evidence
        if: always()
        run: |
          {
            echo "## Docker contract evidence"
            echo "- Artifact: \`docker-contract-${{ github.run_id }}\`"
            echo "- Toolchain report: \`release/docker/toolchain-check.md\`"
            echo "- Release manifest: \`release/manifest/latest.json\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Docker contract evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # tag v7.0.1
        with:
          name: docker-contract-${{ github.run_id }}
          path: |
            release/docker/*.md
            release/manifest/latest.json
            release/manifest/latest.json.sha256
            release/debt/latest.json
            release/debt/latest.md
            release/debt/latest.json.sha256
          if-no-files-found: warn

      - name: Cleanup BuildKit builder
        if: always()
        run: docker buildx rm "$BUILDX_BUILDER" || true
