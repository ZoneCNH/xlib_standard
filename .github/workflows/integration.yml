name: Integration

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # tag v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # tag v5
        with:
          go-version: "1.23"

      - name: Integration
        run: make integration
