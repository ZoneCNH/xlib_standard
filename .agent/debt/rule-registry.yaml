schema_version: "1.0"
module: xlib-standard
registry: debt-governance
rules:
  - id: architecture
    severity: critical
    command: xlibgate architecture
  - id: domain
    severity: critical
    command: xlibgate domain
  - id: docs-drift
    severity: critical
    command: xlibgate docs-drift
  - id: dependency-debt
    severity: critical
    command: xlibgate dependency-debt
  - id: security-debt
    severity: critical
    command: xlibgate security-debt
  - id: testing-debt
    severity: critical
    command: xlibgate testing-debt
  - id: implementation-debt
    severity: critical
    command: xlibgate implementation-debt
  - id: downstream-debt
    severity: critical
    command: xlibgate downstream-debt
