schema_version: "1.0"
fail_closed: true
rules:
  - id: debt.p0.no_exception
    severity: P0
    command: debt
  - id: debt.scanner.fail_closed
    severity: P0
    command: debt
  - id: debt.architecture.anchor
    severity: P1
    command: architecture
  - id: debt.downstream.coverage
    severity: P1
    command: dependency-debt
