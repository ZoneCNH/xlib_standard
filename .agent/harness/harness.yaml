schema_version: "3.1"
module: "xlib-standard"
default_env:
  GOWORK: "off"
proof_depth:
  taxonomy:
    - id: file_exists
      level: D3
      meaning: "Referenced artifact or evidence path exists in the repository or is a gitignored generated output owned by a gate."
      release_evidence: false
    - id: command_registered
      meaning: "A gate command is declared in the harness or command registry."
      release_evidence: false
    - id: dry_run
      meaning: "The gate can execute without external production side effects and reports semantic markers."
      release_evidence: false
    - id: positive_fixture
      meaning: "A passing fixture covers the expected valid path."
      release_evidence: false
    - id: negative_fixture
      meaning: "A failing fixture proves the gate rejects missing or invalid evidence."
      release_evidence: false
    - id: mutation_fixture
      meaning: "A fixture mutates a contract and proves the gate detects drift."
      release_evidence: false
    - id: live_run
      meaning: "A fresh local gate run produced current output for this repository state."
      release_evidence: true
    - id: evidence_replay
      meaning: "A stored evidence artifact can be replayed or checksum-verified against the current contract."
      release_evidence: true
    - id: downstream_adoption
      meaning: "A downstream repository has verified adoption evidence, not merely registration or dry-run output."
      release_evidence: true
  status_reconciliation:
    declared: registered
    scaffolded: planned
    dry_run_ready: dry_run_ready
    partial_implemented: partial_implemented
    implemented: implemented
    executed: executed
    evidence_verified: checksum_verified
    release_usable: usable
  minimums:
    traceability_check: file_exists
    release_gate: live_run
    release_evidence: evidence_replay
    downstream_adoption: downstream_adoption
required_gates:
  - id: fmt
    command: "make fmt"
    purpose: "Go formatting"
    proof_depth: live_run
    target_depth: live_run
  - id: vet
    command: "make vet"
    purpose: "Go static analysis"
    proof_depth: live_run
    target_depth: live_run
  - id: lint
    command: "make lint"
    purpose: "golangci-lint required; missing tool fails"
    proof_depth: live_run
    target_depth: live_run
  - id: test
    command: "make test"
    purpose: "unit tests and example smoke"
    proof_depth: live_run
    target_depth: live_run
  - id: race
    command: "make race"
    purpose: "race detector"
    proof_depth: live_run
    target_depth: live_run
  - id: docs_check
    command: "GOWORK=off make docs-check"
    purpose: "required docs, links, v3.1 runtime and release protocol"
    proof_depth: live_run
    target_depth: live_run
  - id: debt
    command: "GOWORK=off make debt"
    purpose: "release-blocking debt governance gate"
    proof_depth: live_run
    target_depth: live_run
  - id: debt_evidence
    command: "GOWORK=off make debt-evidence"
    purpose: "generate release/debt evidence"
    proof_depth: live_run
    target_depth: evidence_replay
  - id: governance_check
    command: "XLIB_CONTEXT=local_write GOWORK=off make governance-check"
    purpose: "Goal v2.9.3 P0 main/worktree/evidence/boundary/security/CLI/registry/Makefile baseline"
    proof_depth: live_run
    target_depth: live_run
  - id: adoption_check
    command: "GOWORK=off make adoption-check"
    purpose: "验证渲染 downstream repo 已保留 Repository Governance Pack、xlib-standard.lock 与本地 adoption gate。"
    proof_depth: live_run
    target_depth: downstream_adoption
  - id: p1_governance_check
    command: "GOWORK=off make p1-governance-check"
    purpose: "Goal v2.9.3 P1 local dry-run governance contracts"
    proof_depth: live_run
    target_depth: live_run
  - id: p2_runtime_check
    command: "GOWORK=off make p2-runtime-check"
    purpose: "Goal v2.9.3 P2 runtime/downstream/execution-context dry-run contracts"
    proof_depth: live_run
    target_depth: live_run
  - id: boundary
    command: "GOWORK=off make boundary"
    purpose: "module boundary, x.go import ban, business-layer ban"
    proof_depth: live_run
    target_depth: live_run
  - id: security
    command: "GOWORK=off make security"
    purpose: "secret scan by default; govulncheck only when XLIB_ENABLE_VULNCHECK=1 and weekly window is due or XLIB_FORCE_VULNCHECK=1; no /home/k8s/secrets/env/* contents"
    proof_depth: live_run
    target_depth: live_run
  - id: contracts
    command: "GOWORK=off make contracts"
    purpose: "contracts schema and metrics contract validation"
    proof_depth: live_run
    target_depth: live_run
  - id: main_guard
    command: "GOWORK=off make main-guard"
    purpose: "blocks local write work on protected main/master branches"
    proof_depth: live_run
    target_depth: live_run
  - id: worktree_guard
    command: "GOWORK=off make worktree-guard"
    purpose: "requires local write work to run from a worker worktree"
    proof_depth: live_run
    target_depth: live_run
  - id: evidence_check
    command: "GOWORK=off make evidence-check"
    purpose: "validates DONE-with-evidence and artifact policy"
    proof_depth: live_run
    target_depth: live_run
  - id: cli_contract
    command: "GOWORK=off make cli-contract"
    purpose: "validates goalcli CLI contract and report schema"
    proof_depth: live_run
    target_depth: live_run
  - id: issue_registry
    command: "GOWORK=off make issue-registry"
    purpose: "validates issue registry for P0/P1/P2 traceability"
    proof_depth: live_run
    target_depth: live_run
  - id: command_registry
    command: "GOWORK=off make command-registry"
    purpose: "validates command registry for goalcli gates"
    proof_depth: live_run
    target_depth: live_run
  - id: makefile_baseline
    command: "GOWORK=off make makefile-baseline"
    purpose: "validates required Makefile target matrix"
    proof_depth: live_run
    target_depth: live_run
  - id: governance_chain
    command: "GOWORK=off make governance-check"
    purpose: "runs the P0 governance chain"
    proof_depth: live_run
    target_depth: live_run
    alias_of: governance_check
    semantic_role: "P0 chain alias for the same governance_check target."
  - id: p1_governance_chain
    command: "GOWORK=off make p1-governance-check"
    purpose: "runs P1 governance hardening gates"
    proof_depth: live_run
    target_depth: live_run
    alias_of: p1_governance_check
    semantic_role: "P1 chain alias for the same p1_governance_check target."
  - id: p2_runtime_chain
    command: "GOWORK=off make p2-runtime-check"
    purpose: "runs P2 runtime/conformance/execution-context dry-run gates with explicit downstream gaps"
    proof_depth: live_run
    target_depth: live_run
    alias_of: p2_runtime_check
    semantic_role: "P2 chain alias for the same p2_runtime_check target."
  - id: integration
    command: "make integration"
    purpose: "generator 和 downstream smoke"
    proof_depth: live_run
    target_depth: live_run
  - id: score_check
    command: "go run ./cmd/goalcli score --min 9.8"
    purpose: "Release Score 达到 9.8 基准"
    proof_depth: live_run
    target_depth: live_run
  - id: evidence
    command: "CHECK_STATUS=passed GOWORK=off make evidence"
    purpose: "generate release manifest"
    proof_depth: live_run
    target_depth: evidence_replay
  - id: version
    command: "GOWORK=off make version"
    purpose: "goalcli version contract"
    proof_depth: live_run
    target_depth: live_run
  - id: doctor
    command: "GOWORK=off make doctor"
    purpose: "runtime preflight checks"
    proof_depth: live_run
    target_depth: live_run
  - id: docker_toolchain_check
    command: "GOWORK=off make docker-toolchain-check"
    purpose: "Docker Toolchain Runtime static contract and host capability evidence"
    proof_depth: live_run
    target_depth: live_run
  - id: docker_build_check
    command: "GOWORK=off make docker-build-check"
    purpose: "BuildKit toolchain image build check"
    proof_depth: live_run
    target_depth: live_run
  - id: docker_ci
    command: "GOWORK=off make docker-ci"
    purpose: "Dockerized CI gate"
    proof_depth: live_run
    target_depth: live_run
  - id: docker_release_check
    command: "XLIB_CONTEXT=release_verify GOWORK=off make docker-release-check"
    purpose: "Dockerized release-check gate"
    proof_depth: live_run
    target_depth: live_run
  - id: docker_release_final_check
    command: "XLIB_CONTEXT=release_verify GOWORK=off make docker-release-final-check"
    purpose: "Dockerized final release gate"
    proof_depth: live_run
    target_depth: live_run
  - id: docker_goalcli_image
    command: "GOWORK=off make docker-goalcli-image"
    purpose: "goalcli runtime image build contract"
    proof_depth: live_run
    target_depth: live_run
  - id: docker_goalcli_version
    command: "GOWORK=off make docker-goalcli-version"
    purpose: "goalcli runtime image version contract"
    proof_depth: live_run
    target_depth: live_run
  - id: docker_runtime_check
    command: "GOWORK=off make docker-runtime-check"
    purpose: "goalcli-runtime image boundary check"
    proof_depth: live_run
    target_depth: live_run
  - id: docker_drift_check
    command: "GOWORK=off make docker-drift-check"
    purpose: "Docker contract drift report"
    proof_depth: live_run
    target_depth: live_run
  - id: docker_contract
    command: "GOWORK=off make docker-contract"
    purpose: "Docker contract aggregate gate"
    proof_depth: live_run
    target_depth: live_run
  - id: governance_release_scope
    command: "GOWORK=off make governance-check"
    purpose: "P0 worktree, evidence, boundary, security, contracts, docs, CLI, and registry gates"
    proof_depth: live_run
    target_depth: live_run
    alias_of: governance_check
    semantic_role: "Release-scope alias for the same P0 governance_check target."
  - id: p1_governance_release_scope
    command: "GOWORK=off make p1-governance-check"
    purpose: "P1 governance dry-run/verify commands"
    proof_depth: live_run
    target_depth: live_run
    alias_of: p1_governance_check
    semantic_role: "Release-scope alias for the same P1 governance gate target."
  - id: p2_runtime_release_scope
    command: "GOWORK=off make p2-runtime-check"
    purpose: "P2 runtime, packaging, replay, downstream, and execution-context dry-run/verify commands"
    proof_depth: live_run
    target_depth: live_run
    alias_of: p2_runtime_check
    semantic_role: "Release-scope alias for the same P2 runtime gate target."
  - id: release_evidence_check
    command: "RELEASE_EVIDENCE_REQUIRE_PASSED=1 GOWORK=off make release-evidence-check"
    purpose: "validate release manifest and checksum"
    proof_depth: evidence_replay
    target_depth: evidence_replay
extended_gates:
  - id: property
    command: "GOWORK=off make property"
  - id: golden
    command: "GOWORK=off make golden"
  - id: fuzz_smoke
    command: "GOWORK=off make fuzz-smoke"
  - id: ci_extended
    command: "GOWORK=off make ci-extended"
  - id: release_check_extended
    command: "GOWORK=off make release-check-extended"
  - id: goalcli_g12_acceptance
    command: "GOAL_ID=GOAL-20260603-XLIB-GOALCLI-001 GOWORK=off make goal-acceptance"
  - id: goalcli_g13_delivery
    command: "GOAL_ID=GOAL-20260603-XLIB-GOALCLI-001 GOWORK=off make goal-delivery"
  - id: goalcli_g14_handover
    command: "GOAL_ID=GOAL-20260603-XLIB-GOALCLI-001 GOWORK=off make goal-handover"
  - id: goalcli_g15a_downstream_adoption
    command: "GOAL_ID=GOAL-20260603-XLIB-GOALCLI-001 GOWORK=off make goal-downstream-adoption"
  - id: goalcli_g15b_certify
    command: "GOAL_ID=GOAL-20260603-XLIB-GOALCLI-001 GOWORK=off make goal-certify"
final_gates:
  - id: release_score_final
    command: "go run ./cmd/goalcli score --min 9.8"
  - id: release_final_check
    command: "XLIB_CONTEXT=release_verify GOWORK=off make release-final-check"
  - id: release_preflight
    command: "XLIB_CONTEXT=release_verify GOWORK=off make release-preflight VERSION=v0.7.0"
  - id: score
    command: "goalcli score --min 9.8"
  - id: kernel_downstream
    command: "GOWORK=off make integration DOWNSTREAM=kernel"
  - id: goalcli_g16_runtime_final
    command: "GOAL_ID=GOAL-20260603-XLIB-GOALCLI-001 GOWORK=off make goal-runtime-final"
evidence:
  manifest: "release/manifest/latest.json"
  checksum: "release/manifest/latest.json.sha256"
  debt_manifest: "release/debt/latest.json"
  debt_markdown: "release/debt/latest.md"
  debt_checksum: "release/debt/latest.json.sha256"
  goalcli_ledger: ".agent/evidence/ledger.jsonl"
  goalcli_generated_pack: "release/evidence/goalcli/"
  done_format: "DONE with evidence:"
  required_fields:
    - commit
    - tree_sha
    - workflow_run_id
    - artifact_url
    - sha256
    - gates
gate_link_semantics:
  duplicate_command_links: aliases
  duplicate_entries_do_not_create_new_authorities: true
  authority_source: required_gates[].id
forbidden:
  - "x.go dependency in base libraries"
  - "production secrets in source, docs, CI, manifest, Issue, PR, or test logs"
  - "/home/k8s/secrets/env/* contents in any repository artifact"
  - "hidden global clients"
  - "business-domain models in xlib-standard, kernel, or generated base libraries"
  - "legacy baselib-template/foundationx as primary identity outside migration context"

goalcli_v0_1_0:
  mva_status: complete
  control_plane: Harness Runtime
  executor: goalcli
  source_evidence_ledger: .agent/evidence/ledger.jsonl
  generated_evidence_pack: release/evidence/goalcli/
  blocking_activation: PR-6/PR-8 evidence reconciled
  notes:
    - "goalcli v0.1.0 不引入第二套并列执行面。"
    - "G12-G16 是 command-backed 的 goalcli MVA-blocking checks，source evidence 位于 .agent/evidence/ledger.jsonl。"
    - "release/evidence/goalcli/ 是 generated evidence output，不是 source ledger。"
  gates_ref: goalcli_mva_gates
goalcli_mva_gates:
  - id: G12_ACCEPTANCE
    command: "GOWORK=off make goal-acceptance"
    blocking: true
  - id: G13_DELIVERY
    command: "GOWORK=off make goal-delivery"
    blocking: true
  - id: G14_HANDOVER
    command: "GOWORK=off make goal-handover"
    blocking: true
  - id: G15_DOWNSTREAM_ADOPTION
    command: "GOWORK=off make goal-downstream-adoption"
    blocking: true
  - id: G16_CERTIFY
    command: "GOWORK=off make goal-certify"
    blocking: true
  - id: G12_G16_FINAL
    command: "GOWORK=off make goal-runtime-final"
    blocking: true
