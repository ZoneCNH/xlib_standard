# testing.yaml — 测试策略
# 关联规则: core-rules.md, harness-rules.md
# 关联 Gate: test (make test), race (make race)

schema_version: "2.9.3"

status: active

description: |
  定义测试覆盖率要求、测试类型矩阵、测试执行策略。
  测试是 Evidence 的核心来源之一。

testing_policy:
  # 测试类型矩阵
  test_types:
    unit:
      required: true
      command: "make test"
      min_coverage: 80
    race:
      required: true
      command: "make race"
    integration:
      required: true
      command: "make integration"
    boundary:
      required: true
      command: "make boundary"

  # 覆盖率要求
  coverage:
    min_percent: 80
    enforce: true

  # 测试阻断条件
  block_conditions:
    - "单元测试失败"
    - "竞态检测失败"
    - "边界检查失败"
    - "覆盖率低于阈值"

  # 测试 Evidence 要求
  evidence:
    require_test_report: true
    require_coverage_report: true
    format: "json"

source_rules:
  - RULE-CORE-001
  - RULE-CORE-003
  - RULE-HARNESS-003
