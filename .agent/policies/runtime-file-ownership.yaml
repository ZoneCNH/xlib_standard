schema_version: "2.9.3"
# 路径归属与 PR 路由分类。
# 角色名称是抽象类别，不是 GitHub 用户/团队（参见 .github/CODEOWNERS）。
# 仓库绑定真实维护团队后，由 .github/CODEOWNERS 完成账号映射，本文件保持类别稳定。
#
# 字段：
#   owner            -- 抽象角色（governance / gate-runtime / leader / standard / release / ci / testing / security）
#   review_required  -- 修改时是否要求额外审查（PR-check 可据此打 label）
#   review_rule      -- review_required=true 时必须满足的规则/流程名
#   rationale        -- 为什么这个路径敏感
owners:
  ".agent/":
    owner: governance
    review_required: true
    review_rule: RULE-CHANGE
    rationale: 当前治理/运行时控制平面（规则、契约、registry、harness）；不得因 .config 规划被整体清空、删除或 tombstone，只有具备批准目标路径的 scoped release/config facts 可迁移，漂移会影响所有 Gate
  ".agent/rules/iron-rules.md":
    owner: leader
    review_required: true
    review_rule: ADR
    rationale: 七条铁律是最高 SSOT，修改需要 ADR
  ".agent/rules/registry.yaml":
    owner: governance
    review_required: true
    review_rule: RULE-CHANGE
    rationale: 全部 P0/P1/P2/P3 规则总账，新增规则必须经 RULE-CHANGE 流程
  ".agent/harness/":
    owner: gate-runtime
    review_required: true
    review_rule: GATE-CHANGE
    rationale: Gate 定义；修改可能改变 release/PR 阻断行为
  ".agent/contracts/scope-locks.yaml":
    owner: governance
    review_required: true
    review_rule: RULE-CHANGE
    rationale: scope lock 是 source-of-truth 边界分类；漂移会误分 generated 与 runtime artifacts
  ".agent/registries/generated-artifacts.yaml":
    owner: release
    review_required: true
    review_rule: RELEASE-CHANGE
    rationale: generated artifact inventory 控制哪些输出不得作为手写 release evidence 提交
  "cmd/goalcli/":
    owner: gate-runtime
    review_required: true
    review_rule: GATE-RUNTIME-CHANGE
    rationale: 机器裁判内核，所有 Gate 的最终执行者
  "internal/goalcli/":
    owner: gate-runtime
    review_required: true
    review_rule: GATE-RUNTIME-CHANGE
    rationale: goalcli 子模块实现
  "internal/releasequality/":
    owner: release
    review_required: true
    review_rule: RELEASE-QUALITY-CHANGE
    rationale: score 计算决定 release 阻断阈值
  "scripts/check_secrets.sh":
    owner: security
    review_required: true
    review_rule: SECURITY-CHANGE
    rationale: secret 扫描规则；弱化会引入 secret 泄漏风险
  ".githooks/":
    owner: security
    review_required: true
    review_rule: SECURITY-CHANGE
    rationale: pre-commit/pre-push 阻断；弱化等于关闭本地 P0 防线
  ".github/":
    owner: ci
    review_required: true
    review_rule: CI-CHANGE
    rationale: GitHub 平台治理入口；workflow、rules export 和 PR 模板必须保持 gate parity，不能作为配置 SSOT
  ".github/workflows/":
    owner: ci
    review_required: true
    review_rule: CI-CHANGE
    rationale: CI 阻断流水线；与本地 make ci 必须 parity
  ".devcontainer/":
    owner: ci
    review_required: true
    review_rule: CI-CHANGE
    rationale: 开发容器入口会影响本地 gate 环境；配置根迁移前必须保持显式分类
  ".github/CODEOWNERS":
    owner: governance
    review_required: true
    review_rule: CODEOWNERS-CHANGE
    rationale: 账号到角色的映射，决定 PR 强制审查名单
  ".github/dependabot.yml":
    owner: security
    review_required: true
    review_rule: SECURITY-CHANGE
    rationale: dependency automation 影响安全与供应链审查覆盖
  ".github/ISSUE_TEMPLATE/":
    owner: governance
    review_required: true
    review_rule: GOVERNANCE-CHANGE
    rationale: issue intake template 定义实现前必须收集的 Goal 与 Evidence 字段
  ".github/pull_request_template.md":
    owner: governance
    review_required: true
    review_rule: GOVERNANCE-CHANGE
    rationale: PR template 承载 Evidence、release、downstream 和 generated-artifact 断言
  ".github/rulesets/":
    owner: ci
    review_required: true
    review_rule: CI-CHANGE
    rationale: repository ruleset 是平台原生 enforcement adapter，必须与本地 gate 对齐
  "Makefile":
    owner: ci
    review_required: true
    review_rule: CI-CHANGE
    rationale: 本地 Gate 入口，本地与 CI 必须 parity (RULE-PARITY-001)
  ".gitignore":
    owner: ci
    review_required: true
    review_rule: CI-CHANGE
    rationale: 保护 generated/runtime artifacts 不被误提交；分类漂移会污染 release evidence
  ".dockerignore":
    owner: ci
    review_required: true
    review_rule: CI-CHANGE
    rationale: Docker build context 边界；必须排除本地运行态和 generated release 输出
  ".omx/context/goalcli-v0.1.0-team-20260603T005302Z.md":
    owner: governance
    review_required: true
    review_rule: EVIDENCE-CHANGE
    rationale: 已纳入版本控制的 runtime context 是非 release 迁移 evidence，不能按本地状态忽略
  ".omx/context/stable-config-migration-gates-20260607T030733Z.md":
    owner: governance
    review_required: true
    review_rule: EVIDENCE-CHANGE
    rationale: 已纳入版本控制的 runtime context 是 stable migration evidence，必须触发迁移影响 gate
  "pkg/templatex/":
    owner: standard
    review_required: true
    review_rule: STANDARD-API-CHANGE
    rationale: 公共 API 模板，下游库会渲染消费，破坏性变更影响所有下游
  "templates/l2/":
    owner: standard
    review_required: true
    review_rule: STANDARD-TEMPLATE-CHANGE
    rationale: L2 adapter template 定义 downstream adoption 表面，可能保留临时兼容路径
  "scripts/verify_l2_standard.py":
    owner: testing
    review_required: true
    review_rule: GATE-CHANGE
    rationale: L2 template verifier 是 downstream template contract 的迁移 gate
  "contracts/":
    owner: standard
    review_required: true
    review_rule: CONTRACT-CHANGE
    rationale: schema 契约；破坏 downstream adoption
  "docs/architecture/":
    owner: standard
    review_required: true
    review_rule: ARCHITECTURE-CHANGE
    rationale: 架构文档位于 contracts 之后、AGENTS.md 之前，漂移会破坏分层边界与下游采纳
  "release/":
    owner: release
    review_required: true
    review_rule: RELEASE-CHANGE
    rationale: manifest/evidence 归档，发布证据 SSOT
  "testkit/":
    owner: testing
    review_required: false
    rationale: 测试夹具，下游测试可复用
  "docs/standard/":
    owner: standard
    review_required: true
    review_rule: STANDARD-DOC-CHANGE
    rationale: 标准文档，权威源
  "docs/goal/goal.md":
    owner: leader
    review_required: true
    review_rule: GOAL-CHANGE
    rationale: 当前 Goal 主控文档
  "CONSTITUTION.md":
    owner: leader
    review_required: true
    review_rule: GOVERNANCE-CHANGE
    rationale: 项目章程，权威顺序定义
  "AGENTS.md":
    owner: governance
    review_required: false
    rationale: Agent 协作指南
