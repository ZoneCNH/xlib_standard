# evidence.yaml — 证据策略
# 关联规则: evidence-rules.md, iron-rules.md (铁律 1/3/4)
# 关联 Gate: evidence-check, traceability-check

schema_version: "2.9.3"

status: active

description: |
  定义 Evidence 的格式、存储、校验规则。
  Evidence 是 DONE 的唯一合法证明（铁律第 1 条）。

evidence_policy:
  # Evidence 必须包含的字段
  required_fields:
    - evidence_id          # EVID-<task-id>-YYYYMMDD-NNN
    - related_goal         # GOAL-YYYYMMDD-NNN
    - related_task         # TASK-<goal-id>-NNN
    - related_requirement  # REQ-<spec-id>-NNN
    - command              # 执行的命令
    - output               # 命令输出摘要
    - artifact_path        # 产物路径
    - timestamp            # ISO 8601
    - status               # pass | fail | partial

  # 禁止的 Evidence 表述
  forbidden_patterns:
    - "测试通过了"
    - "已完成"
    - "没问题"
    - "OK"

  # Evidence 存储
  storage:
    source_of_truth: ".agent/evidence/ledger.jsonl"
    generated_artifacts: "release/evidence/"
    # generated_artifacts 不是 source of truth

  # Traceability 要求
  traceability:
    required_chain: "Goal → Req → AC → Task → Issue → Commit → PR → Evidence → Release"
    allow_partial: false

source_rules:
  - RULE-EVIDENCE-001
  - RULE-EVIDENCE-002
  - RULE-EVIDENCE-003
  - RULE-CORE-001
  - RULE-CORE-004
  - RULE-TRACE-001
