# release.yaml — 发布策略
# 关联规则: release-rules.md, iron-rules.md (铁律 1/4/6)
# 关联 Gate: release-check, release-final-check, release-preflight

schema_version: "2.9.3"

status: active

description: |
  定义发布流程、版本策略、发布阻断条件。
  发布必须满足 Evidence Gate + Release Gate + Score Gate 三重验证。

release_policy:
  # 发布前必须满足的 Gate
  required_gates:
    - evidence-check
    - release-check
    - release-final-check
    - release-preflight
    - score-gate

  # Score 门槛
  min_score: 9.8

  # 发布阻断条件
  block_conditions:
    - "P0 Gate 失败"
    - "Evidence 缺失"
    - "Traceability 断链"
    - "Secret 泄漏"
    - "工作区不 clean"

  # 版本策略
  versioning:
    scheme: semver
    pre_release_tag: "-rc"
    require_changelog: true
    merge_to_main_increment: patch_plus_one
    merge_to_main_workflow: ".github/workflows/release-auto-patch.yml"
    duplicate_commit_policy: reuse_existing_stable_tag
    concurrency_group: release-auto-patch-main

  # 发布产物要求
  artifacts:
    require_manifest: true
    require_checksum: true
    checksum_algorithm: sha256

source_rules:
  - RULE-RELEASE-001
  - RULE-RELEASE-004
  - RULE-REL-ARTIFACT-001
  - RULE-CORE-001
  - RULE-CORE-004
