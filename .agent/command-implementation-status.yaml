schema_version: "1.0"
module: xlib-standard
source_registry: ".agent/command-registry.yaml"
truth_state: ".agent/truth-state.yaml"
purpose: "把命令 registry 的存在事实拆成 registered、dry_run_ready、implemented、executed，避免把注册命令误报为已交付。"
status_values:
  registered: "registry 中有条目，但没有实现或运行证据。"
  planned: "有计划或目标，但没有可执行契约。"
  dry_run_ready: "可执行 dry-run/verify 契约，输出只能证明契约或差距。"
  implemented: "已有命令实现或脚本委托，是否通过必须看当前运行证据。"
  executed: "当前上下文实际执行过。"
groups:
  p0_implemented_or_scripted:
    phase: P0
    implementation_status: implemented
    evidence_strength: "requires_current_command_output"
    commands:
      - version
      - doctor
      - minimal-kernel
      - main-guard
      - worktree-guard
      - evidence-check
      - done-assertion
      - cli-contract
      - issue-registry
      - command-registry
      - makefile-baseline
      - boundary
      - contracts
      - dependency-check
      - docs-check
      - evidence
      - manifest
      - integration
      - release-evidence-check
      - release-evidence-checksum-check
      - release-evidence-hash
      - release-final-check
      - render-check
      - score
      - secrets
      - security
      - standard-impact-check
  p1_dry_run_contracts:
    phase: P1
    implementation_status: dry_run_ready
    evidence_strength: "dry_run_contract_only"
    commands:
      - agent-team-contract
      - scope-lock
      - pr-template
      - acceptance-matrix
      - runtime-health
      - goal-runtime
      - naming
      - upgrade-standard
      - conformance-profile
      - downstream-registry
      - self-healing-skeleton
      - policy-schema
      - github-settings
      - github-governance
      - governance-fixture-test
      - toolchain
      - evidence-artifacts
      - supply-chain
      - autoresearch
      - changelog
  p2_dry_run_contracts:
    phase: P2
    implementation_status: dry_run_ready
    evidence_strength: "dry_run_contract_only"
    commands:
      - install-runtime
      - upgrade-runtime
      - release-ready
      - evidence-replay
      - attest-conformance
      - pack-standard
      - pack-gate
      - pack-evidence
      - runtime-file-ownership
      - execution-context
  p2_downstream_gap_reports:
    phase: P2
    implementation_status: dry_run_ready
    evidence_strength: "gap_report_only"
    commands:
      - downstream-baseline
      - downstream-adoption
forbidden_interpretations:
  - "registry 条目不得解释为命令已执行。"
  - "dry-run/verify 输出不得解释为 release_usable。"
  - "P2 downstream gap report 不得解释为 downstream adopted。"
  - "CHECK_STATUS=passed 不得解释为 release-ready 证据。"
current_mva_assertions:
  no_new_gate_result_runtime: true
  no_release_check_behavior_change: true
  no_release_manifest_cutover: true
