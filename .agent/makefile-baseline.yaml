schema_version: "2.9.3"
module: xlib-standard
baseline_targets:
  fmt: "go fmt ./..."
  vet: "go vet ./..."
  lint: "golangci-lint run ./..."
  test: "go test ./..."
  race: "go test -race ./..."
  boundary: "$(GOALCLI) boundary"
  architecture: "$(GOALCLI) debt --section architecture --mode enforce"
  domain: "$(GOALCLI) debt --section domain --mode enforce"
  docs-drift: "$(GOALCLI) debt --section docs --mode warn"
  dependency-debt: "$(GOALCLI) debt --section dependency --mode warn"
  testing-debt: "$(GOALCLI) debt --section testing --mode warn"
  implementation-debt: "$(GOALCLI) debt --section implementation --mode observe"
  security-debt: "$(GOALCLI) debt --section security --mode warn"
  debt: "$(GOALCLI) debt --config .agent/debt/rules.yaml --exceptions .agent/debt/exceptions.yaml --dependency-purpose .agent/debt/dependency-purpose.yaml --mode enforce --min-score 9.8"
  debt-evidence: "$(GOALCLI) debt-evidence"
  debt-register-update: "$(GOALCLI) debt register-update"
  debt-trend: "$(GOALCLI) debt trend"
  debt-patch-suggest: "$(GOALCLI) debt patch-suggest"
  debt-lifecycle-check: "$(GOALCLI) debt lifecycle-check"
  security: "$(GOALCLI) security"
  contracts: "$(GOALCLI) contracts"
  schema-check: "$(GOALCLI) schema validate --all --report reports/schema-check.json"
  docs-check: "$(GOALCLI) docs-check"
  rules-verify: "$(GOALCLI) rules-verify"
  downstream-debt: "$(GOALCLI) downstream-debt"
  downstream-sync-plan: "$(GOALCLI) downstream-sync-plan"
  debt-evidence-hash: "$(GOALCLI) debt-evidence-hash"
  debt-evidence-checksum-check: "$(GOALCLI) debt-evidence-checksum-check"
  evidence: "$(GOALCLI) evidence"
  score-check: "$(GOALCLI) score --min 9.8"
  main-guard: "$(GOALCLI) main-guard --context $(XLIB_CONTEXT)"
  worktree-guard: "$(GOALCLI) worktree-guard --context $(XLIB_CONTEXT)"
  worktree-check: "$(GOALCLI) worktree-check --context $(XLIB_CONTEXT)"
  context-check: "$(GOALCLI) context-check"
  spec-check: "$(GOALCLI) spec-check"
  design-check: "$(GOALCLI) design-check"
  task-check: "$(GOALCLI) task-check"
  pr-check: "$(GOALCLI) pr-check --context $(XLIB_CONTEXT)"
  evidence-check: "$(GOALCLI) evidence-check"
  cli-contract: "$(GOALCLI) cli-contract"
  issue-registry: "$(GOALCLI) issue-registry"
  command-registry: "$(GOALCLI) command-registry"
  makefile-baseline: "$(GOALCLI) makefile-baseline"
  audit-goal: "$(GOALCLI) audit-goal"
  dashboard-generate: "$(GOALCLI) dashboard-generate"
  context-profile: "$(GOALCLI) context-profile --profile $${PROFILE:-standard}"
  context-profile-check: "$(GOALCLI) context-profile-check"
  context-schema-check: "$(GOALCLI) context-schema-check"
  context-lite: "require-gowork-off + governance-check"
  context-standard: "require-gowork-off + governance-check + p1-governance-check + docs-check"
  context-full: "require-gowork-off + governance-check + p1-governance-check + p2-runtime-check"
  context-release: "require-gowork-off + context-full + integration + dependency-check + standard-impact-check + score-check + debt-evidence + release evidence"
  context-fast-check: "Legacy alias for context-lite"
  context-standard-check: "Legacy alias for context-standard"
  context-full-check: "Legacy alias for context-full"
  governance-check: "P0 governance gate chain + debt"
  p1-governance-check: "P1 governance gate chain"
  execution-context: "$(GOALCLI) execution-context --dry-run --verify"
  p2-runtime-check: "P2 dry-run runtime/conformance chain"
  release-check: "require-gowork-off + ci + governance + evidence"
  release-final-check: "release_verify context-release + strict release evidence"
  goal-acceptance: "$(GOALCLI) goal-acceptance --goal-id $${GOAL_ID:?set GOAL_ID} --mode $${GOAL_RUNTIME_MODE:-FULL} --json --write-evidence"
  goal-delivery: "$(GOALCLI) goal-delivery --goal-id $${GOAL_ID:?set GOAL_ID} --mode $${GOAL_RUNTIME_MODE:-FULL} --json --write-evidence"
  goal-handover: "$(GOALCLI) goal-handover --goal-id $${GOAL_ID:?set GOAL_ID} --mode $${GOAL_RUNTIME_MODE:-FULL} --json --write-evidence"
  goal-downstream-adoption: "$(GOALCLI) goal-downstream-adoption --goal-id $${GOAL_ID:?set GOAL_ID} --mode $${GOAL_RUNTIME_MODE:-FULL} --json --write-evidence"
  goal-certify: "$(GOALCLI) goal-certify --goal-id $${GOAL_ID:?set GOAL_ID} --mode $${GOAL_RUNTIME_MODE:-FULL} --json --write-evidence"
  goal-runtime-final: "$(GOALCLI) goal-runtime-final --goal-id $${GOAL_ID:?set GOAL_ID} --mode $${GOAL_RUNTIME_MODE:-FULL} --json --write-evidence"
