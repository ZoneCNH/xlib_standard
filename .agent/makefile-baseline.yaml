schema_version: "2.9.3"
module: xlib-standard
baseline_targets:
  fmt: "go fmt ./..."
  vet: "go vet ./..."
  lint: "golangci-lint run ./..."
  test: "go test ./..."
  race: "go test -race ./..."
  boundary: "$(XLIBGATE) boundary"
  security: "govulncheck ./... + $(XLIBGATE) security"
  contracts: "$(XLIBGATE) contracts"
  docs-check: "$(XLIBGATE) docs-check"
  evidence: "$(XLIBGATE) evidence"
  score-check: "$(XLIBGATE) score --min 9.8"
  main-guard: "$(XLIBGATE) main-guard --context $(XLIB_CONTEXT)"
  worktree-guard: "$(XLIBGATE) worktree-guard --context $(XLIB_CONTEXT)"
  evidence-check: "$(XLIBGATE) evidence-check"
  cli-contract: "$(XLIBGATE) cli-contract"
  issue-registry: "$(XLIBGATE) issue-registry"
  command-registry: "$(XLIBGATE) command-registry"
  makefile-baseline: "$(XLIBGATE) makefile-baseline"
  context-profile: "$(XLIBGATE) context-profile --profile $${PROFILE:-standard}"
  context-profile-check: "$(XLIBGATE) context-profile-check"
  context-schema-check: "$(XLIBGATE) context-schema-check"
  context-lite: "require-gowork-off + governance-check"
  context-standard: "require-gowork-off + governance-check + p1-governance-check + docs-check"
  context-full: "require-gowork-off + governance-check + p1-governance-check + p2-runtime-check"
  context-release: "require-gowork-off + context-full + integration + dependency-check + standard-impact-check + score-check + release evidence"
  context-fast-check: "Legacy alias for context-lite"
  context-standard-check: "Legacy alias for context-standard"
  context-full-check: "Legacy alias for context-full"
  governance-check: "P0 governance gate chain"
  p1-governance-check: "P1 governance gate chain"
  execution-context: "$(XLIBGATE) execution-context --dry-run --verify"
  p2-runtime-check: "P2 dry-run runtime/conformance chain"
  release-check: "require-gowork-off + ci + governance + evidence"
  release-final-check: "release_verify context-release + strict release evidence"
