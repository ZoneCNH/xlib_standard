schema_version: "2.9.3"
module: xlib-standard
baseline_targets:
  fmt: "go fmt ./..."
  vet: "go vet ./..."
  lint: "golangci-lint run ./..."
  test: "go test ./..."
  race: "go test -race ./..."
  boundary: "$(XLIBGATE) boundary"
  architecture: "$(XLIBGATE) debt --section architecture --mode enforce"
  domain: "$(XLIBGATE) debt --section domain --mode enforce"
  docs-drift: "$(XLIBGATE) debt --section docs --mode warn"
  dependency-debt: "$(XLIBGATE) debt --section dependency --mode warn"
  testing-debt: "$(XLIBGATE) debt --section testing --mode warn"
  implementation-debt: "$(XLIBGATE) debt --section implementation --mode observe"
  security-debt: "$(XLIBGATE) debt --section security --mode warn"
  debt: "$(XLIBGATE) debt --mode enforce --min-score 9.8"
  debt-evidence: "generate release/debt/latest.json, latest.md, and latest.json.sha256"
  debt-register-update: "$(XLIBGATE) debt register-update"
  debt-trend: "$(XLIBGATE) debt trend"
  debt-patch-suggest: "$(XLIBGATE) debt patch-suggest"
  debt-lifecycle-check: "$(XLIBGATE) debt lifecycle-check"
  security: "govulncheck ./... + $(XLIBGATE) security"
  contracts: "$(XLIBGATE) contracts"
  docs-check: "$(XLIBGATE) docs-check"
  debt: "$(XLIBGATE) debt"
  architecture: "$(XLIBGATE) architecture"
  domain: "$(XLIBGATE) domain"
  docs-drift: "$(XLIBGATE) docs-drift"
  dependency-debt: "$(XLIBGATE) dependency-debt"
  security-debt: "$(XLIBGATE) security-debt"
  testing-debt: "$(XLIBGATE) testing-debt"
  implementation-debt: "$(XLIBGATE) implementation-debt"
  downstream-debt: "$(XLIBGATE) downstream-debt"
  debt-evidence: "$(XLIBGATE) debt-evidence"
  debt-evidence-hash: "$(XLIBGATE) debt-evidence-hash"
  debt-evidence-checksum-check: "$(XLIBGATE) debt-evidence-checksum-check"
  evidence: "$(XLIBGATE) evidence"
  score-check: "$(XLIBGATE) score --min 9.8"
  main-guard: "$(XLIBGATE) main-guard --context $(XLIB_CONTEXT)"
  worktree-guard: "$(XLIBGATE) worktree-guard --context $(XLIB_CONTEXT)"
  evidence-check: "$(XLIBGATE) evidence-check"
  cli-contract: "$(XLIBGATE) cli-contract"
  issue-registry: "$(XLIBGATE) issue-registry"
  command-registry: "$(XLIBGATE) command-registry"
  makefile-baseline: "$(XLIBGATE) makefile-baseline"
  context-profile: "$(XLIBGATE) context-profile --profile $${PROFILE:-standard}"
  context-profile-check: "$(XLIBGATE) context-profile-check"
  context-schema-check: "$(XLIBGATE) context-schema-check"
  context-lite: "require-gowork-off + governance-check"
  context-standard: "require-gowork-off + governance-check + p1-governance-check + docs-check"
  context-full: "require-gowork-off + governance-check + p1-governance-check + p2-runtime-check"
  context-release: "require-gowork-off + context-full + integration + dependency-check + standard-impact-check + score-check + debt-evidence + release evidence"
  context-fast-check: "Legacy alias for context-lite"
  context-standard-check: "Legacy alias for context-standard"
  context-full-check: "Legacy alias for context-full"
  governance-check: "P0 governance gate chain + debt"
  p1-governance-check: "P1 governance gate chain"
  goal-acceptance: "$(XLIBGATE) goal-acceptance --dry-run --verify"
  goal-delivery: "$(XLIBGATE) goal-delivery --dry-run --verify"
  goal-handover: "$(XLIBGATE) goal-handover --dry-run --verify"
  goal-downstream: "$(XLIBGATE) goal-downstream --dry-run --verify"
  goal-certify: "$(XLIBGATE) goal-certify --dry-run --verify"
  execution-context: "$(XLIBGATE) execution-context --dry-run --verify"
  p2-runtime-check: "P2 dry-run runtime/conformance chain"
  release-check: "require-gowork-off + ci + governance + evidence"
  release-final-check: "release_verify context-release + strict release evidence"
  goal-acceptance: "$(XLIBGATE) goal-acceptance --goal-id $${GOAL_ID:?set GOAL_ID} --mode $${GOAL_RUNTIME_MODE:-FULL} --json"
  goal-delivery: "$(XLIBGATE) goal-delivery --goal-id $${GOAL_ID:?set GOAL_ID} --mode $${GOAL_RUNTIME_MODE:-FULL} --json"
  goal-handover: "$(XLIBGATE) goal-handover --goal-id $${GOAL_ID:?set GOAL_ID} --mode $${GOAL_RUNTIME_MODE:-FULL} --json"
  goal-downstream-adoption: "$(XLIBGATE) goal-downstream-adoption --goal-id $${GOAL_ID:?set GOAL_ID} --mode $${GOAL_RUNTIME_MODE:-FULL} --json"
  goal-certify: "$(XLIBGATE) goal-certify --goal-id $${GOAL_ID:?set GOAL_ID} --mode $${GOAL_RUNTIME_MODE:-FULL} --json"
  goal-runtime-final: "$(XLIBGATE) goal-runtime-final --goal-id $${GOAL_ID:?set GOAL_ID} --mode $${GOAL_RUNTIME_MODE:-FULL} --json"
