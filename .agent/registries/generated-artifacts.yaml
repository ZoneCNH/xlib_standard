schema_version: "1.0"
classification:
  artifact_class: generated_artifact_inventory
  authority: source_of_truth
  validated_by: release-evidence-check
  notes: "Catalog only; artifacts remain generated-only and are validated by release gates."
artifacts:
  - path: .agent/registries/downstream-baseline-scan.yaml
    classification: generated_artifact
    source_control: generated-only
    generated_by: "goalcli downstream-baseline"
    validated_by: standard-impact-check
  - path: release/manifest/latest.json
    classification: generated_artifact
    source_control: generated-only
    generated_by: "GOWORK=off make evidence"
    validated_by: release-evidence-check
  - path: release/manifest/latest.json.sha256
    classification: generated_artifact
    source_control: generated-only
    generated_by: "GOWORK=off make evidence"
    validated_by: release-evidence-check
  - path: .agent/rules/registry.yaml
    classification: validated_mirror
    source_control: generated-only
    generated_by: "goalcli rules-verify"
    validated_by: command-registry
  - path: .agent/rules/agent-runtime-rules.md
    classification: validated_mirror
    source_control: generated-only
    generated_by: "goalcli rules-verify"
    validated_by: command-registry
  - path: .agent/rules/core-rules.md
    classification: validated_mirror
    source_control: generated-only
    generated_by: "goalcli rules-verify"
    validated_by: command-registry
  - path: .agent/rules/schema-registry-rules.md
    classification: validated_mirror
    source_control: generated-only
    generated_by: "goalcli rules-verify"
    validated_by: command-registry
  # validated_mirror 注册（由 gate 校验的镜像文件）
  - path: .agent/registries/command-implementation-status.yaml
    classification: generated_artifact
    source_control: generated-only
    generated_by: "goalcli command-registry"
    validated_by: command-registry
    mutability: generated
  - path: .agent/registries/makefile-target-registry.yaml
    classification: generated_artifact
    source_control: generated-only
    generated_by: "goalcli makefile-baseline"
    validated_by: makefile-baseline
    mutability: generated
  - path: .agent/registries/makefile-baseline.yaml
    classification: generated_artifact
    source_control: generated-only
    generated_by: "goalcli makefile-baseline"
    validated_by: makefile-baseline
    mutability: generated
  - path: .agent/registries/downstream-adoption-status.yaml
    classification: generated_artifact
    source_control: generated-only
    generated_by: "goalcli downstream-adoption"
    validated_by: standard-impact-check
    mutability: generated
  - path: .agent/traceability/traceability-matrix.md
    classification: generated_artifact
    source_control: generated-only
    generated_by: "goalcli traceability-check"
    validated_by: governance-check
    mutability: generated
  # documentation_mirror（模板，由 docs-check 校验）
  - path: .agent/release/release-template.md
    classification: generated_artifact
    source_control: generated-only
    generated_by: "goalcli release-check"
    validated_by: docs-check
    mutability: generated
  - path: .agent/evidence/evidence-template.md
    classification: generated_artifact
    source_control: generated-only
    generated_by: "goalcli evidence-check"
    validated_by: docs-check
    mutability: generated
  # release/standard-impact 与 release/downstream-sync 生成 artifact
  - path: release/standard-impact/latest.md
    classification: generated_artifact
    source_control: generated-only
    generated_by: "goalcli standard-impact-check"
    validated_by: standard-impact-check
  - path: release/downstream-sync/latest.md
    classification: generated_artifact
    source_control: generated-only
    generated_by: "goalcli downstream-sync-plan"
    validated_by: standard-impact-check
  # release/debt 生成 artifact
  - path: release/debt/latest.json
    classification: generated_artifact
    source_control: generated-only
    generated_by: "GOWORK=off make debt-evidence"
    validated_by: debt
  - path: release/debt/latest.json.sha256
    classification: generated_artifact
    source_control: generated-only
    generated_by: "GOWORK=off make debt-evidence"
    validated_by: debt
  - path: release/debt/latest.md
    classification: generated_artifact
    source_control: generated-only
    generated_by: "GOWORK=off make debt-evidence"
    validated_by: debt
