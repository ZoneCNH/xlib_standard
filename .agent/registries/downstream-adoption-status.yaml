    evidence_state: not_run
    docker_contract_required: true
    docker_contract_status: pending
    docker_contract_evidence_state: not_run

first_pr_mva_assertions:
  no_downstream_repo_write: true
  no_migration_wave_execution: true
  no_proof_based_adoption: true
  no_baseline_scan_claim: true

forbidden_upgrades:
  - "registered != adopted"
  - "baseline_scanned != adopted"
  - "patch_only != proof_based_adoption"
  - "standard_target_declared != downstream implemented"
  - "proof_contract_absent != adopted"
  - "gate_outputs_missing != proof_based_adoption"
