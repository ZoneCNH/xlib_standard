generated_artifact_policy:
  manifest_mutability: hand_written
  do_not_commit_generated_release_manifest:
  - release/manifest/latest.json
  - release/manifest/latest.json.sha256
  generated_only_agent_artifacts:
  - .agent/downstream-baseline-scan.yaml
  - .agent/rules/registry.yaml
  - .agent/rules/agent-runtime-rules.md
  - .agent/rules/core-rules.md
  - .agent/rules/schema-registry-rules.md
  validated_mirror_rule: Generated-only .agent/rules/* mirrors remain generated validated_mirror entries and must be regenerated
    by their validators, not hand-edited during Phase 3.
  source_of_truth: .agent/generated-artifacts.yaml
compatibility_exceptions:
- path_family: .agent/index.yaml
  reason: Phase 3 only prepares the physical manifest; the current logical index remains authoritative while control_plane.physical_migration
    is false.
  expires: Phase 4 physical migration and consumer update.
- path_family: cmd/**, internal/**, scripts/**, docs/**, test fixtures
  reason: Hard-coded current .agent paths are allowed until Phase 4 updates code, tests, scripts, and docs atomically with
    physical moves.
  expires: Phase 4 consumer migration.
- path_family: generated-only artifacts
  reason: Generated artifacts listed in .agent/generated-artifacts.yaml must be regenerated or left uncommitted; Phase 3 must
    not hand-move generated output.
  expires: Never for hand edits; only generator output may change them.
- path_family: non-indexed .agent path literals
  reason: Scan found fixture/example/planned/legacy .agent literals that are not current indexed files; they are compatibility
    inputs, not manifest entries.
  expires: When owning tests/docs are explicitly migrated.
